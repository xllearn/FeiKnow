version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:0.7.0-pg16
    container_name: feiknow-postgres
    environment:
      POSTGRES_DB: feiknow
      POSTGRES_USER: feiknow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-feiknow123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feiknow -d feiknow"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
